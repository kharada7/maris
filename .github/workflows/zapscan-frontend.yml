name: Start Frontend Application for Zap Scan

on:
  workflow_call:
    outputs:
      application-url:
        description: デプロイしたフロントエンドアプリケーションのURL
        value: ${{ jobs.start-frontend.outputs.application-url }}
  workflow_dispatch:

jobs:
  start-frontend:
    name: Start Frontend Application
    runs-on: ubuntu-latest
    outputs:
      application-url: ${{ steps.deploy-application.outputs.application-url }}
    defaults:
      run:
        working-directory: samples/Dressca/dressca-frontend
    env:
      APPLICATION_HOST: 127.0.0.1
      APPLICATION_PORT: 4173
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Use Node.js LTS
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: lts/*
          cache: npm
      - name: Node パッケージのインストール
        run: npm ci
      
      - id: application-build
        name: アプリケーションのビルド
        run: npm run build:prod:consumer

      - id: deploy-application
        name: Web サーバーへのデプロイ
        shell: bash
        run: |
          nohup npm run preview -w consumer -- --host "${APPLICATION_HOST}" --port "${APPLICATION_PORT}" > /var/tmp/consumer-preview.log 2>&1 &
          echo "application-url=http://${APPLICATION_HOST}:${APPLICATION_PORT}" >> "$GITHUB_OUTPUT"

      - name: Web サーバーの起動確認
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent "http://${APPLICATION_HOST}:${APPLICATION_PORT}" > /dev/null; then
              exit 0
            fi
            sleep 2
          done

          cat /var/tmp/consumer-preview.log
          exit 1