name: ZAP Scan for CSR Application

on:
  workflow_dispatch:

env:
  FRONTEND_HOST: 127.0.0.1
  FRONTEND_PORT: 4173
  BACKEND_HOST: 127.0.0.1
  BACKEND_PORT: 5000

jobs:
  zap-scan:
    name: Run OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      
      # Frontend セットアップとデプロイ
      - name: Use Node.js LTS
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: lts/*
          cache: npm
      
      - name: Node パッケージのインストール
        working-directory: samples/Dressca/dressca-frontend
        run: npm ci
      
      - name: フロントエンドのビルド
        working-directory: samples/Dressca/dressca-frontend
        run: npm run build:prod:consumer
      
      - name: フロントエンドサーバーへのデプロイ
        working-directory: samples/Dressca/dressca-frontend
        shell: bash
        run: |
          nohup npm run preview -w consumer -- --host "${FRONTEND_HOST}" --port "${FRONTEND_PORT}" > /var/tmp/consumer-preview.log 2>&1 &
      
      # Backend セットアップとデプロイ
      - name: .NET SDK のセットアップ
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          dotnet-version: '10.*'
      
      - name: NuGet パッケージの復元
        working-directory: samples/Dressca/dressca-backend
        run: dotnet restore Dressca.Web.Consumer.slnf
      
      - name: バックエンドのビルド
        working-directory: samples/Dressca/dressca-backend
        env:
          BUILD_CONFIGURATION: Release
        run: dotnet build Dressca.Web.Consumer.slnf --no-restore --configuration Release --verbosity minimal
      
      - name: バックエンドサーバーへのデプロイ
        working-directory: samples/Dressca/dressca-backend
        shell: bash
        run: |
          nohup dotnet run --project src/Dressca.Web.Consumer/Dressca.Web.Consumer.csproj --configuration Release --no-build -- --urls "http://${BACKEND_HOST}:${BACKEND_PORT}" > /var/tmp/consumer-api.log 2>&1 &
      
      # ヘルスチェック
      - name: フロントエンドの起動確認
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent "http://${FRONTEND_HOST}:${FRONTEND_PORT}" > /dev/null; then
              exit 0
            fi
            sleep 2
          done

          cat /var/tmp/consumer-preview.log
          exit 1
      
      - name: バックエンドの起動確認
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent "http://${BACKEND_HOST}:${BACKEND_PORT}" > /dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done

          cat /var/tmp/consumer-api.log
          exit 1
      
      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: http://${{ env.FRONTEND_HOST }}:${{ env.FRONTEND_PORT }}
          rules_file_name: .zap/rules.tsv
          cmd_options: '-a -j'
          allow_issue_writing: false
      