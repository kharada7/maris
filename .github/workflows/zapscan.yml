name: ZAP Scan for CSR Application

on:
  workflow_dispatch:

env:
  FRONTEND_HOST: 127.0.0.1
  FRONTEND_PORT: 4173
  BACKEND_HOST: 127.0.0.1
  BACKEND_PORT: 5000

jobs:
  zap-scan:
    name: Run OWASP ZAP Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      
      # Frontend セットアップとデプロイ
      - name: Use Node.js LTS
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: lts/*
          cache: npm
      
      - name: Node パッケージのインストール
        working-directory: samples/Dressca/dressca-frontend
        run: npm ci
      
      - name: フロントエンドのビルド
        working-directory: samples/Dressca/dressca-frontend
        run: npm run build:prod:consumer
      
      - name: フロントエンドサーバーへのデプロイ
        working-directory: samples/Dressca/dressca-frontend
        shell: bash
        run: |
          nohup npm run preview -w consumer -- --host "${FRONTEND_HOST}" --port "${FRONTEND_PORT}" > /var/tmp/consumer-preview.log 2>&1 &
      
      # Backend セットアップとデプロイ
      - name: .NET SDK のセットアップ
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          dotnet-version: '10.*'
      
      - name: NuGet パッケージの復元
        working-directory: samples/Dressca/dressca-backend
        run: dotnet restore Dressca.Web.Consumer.slnf
      
      - name: バックエンドのビルド
        working-directory: samples/Dressca/dressca-backend
        env:
          BUILD_CONFIGURATION: Release
        run: dotnet build Dressca.Web.Consumer.slnf --no-restore --configuration Release --verbosity minimal
      
      - name: バックエンドサーバーへのデプロイ
        working-directory: samples/Dressca/dressca-backend
        shell: bash
        run: |
          nohup dotnet run --project src/Dressca.Web.Consumer/Dressca.Web.Consumer.csproj --configuration Release --no-build -- --urls "http://${BACKEND_HOST}:${BACKEND_PORT}" > /var/tmp/consumer-api.log 2>&1 &

      - name: SQL Server の Docker イメージをプル
        run: sudo docker pull mcr.microsoft.com/mssql/server:2022-latest

      - name: SQL Server コンテナの起動
        shell: bash
        run: |
          sudo docker run -e "ACCEPT_EULA=Y" \
          -e "MSSQL_SA_PASSWORD=P@ssw0rd" \
          -p 1433:1433 --name sql1 \
          --hostname sql1 \
          -d mcr.microsoft.com/mssql/server:2022-latest

      - name: データベース接続文字列を取得
        id: get-connection-string
        env:
          APPSETTINGS_FILEPATH: src/Dressca.Web.Consumer/appsettings.json
        run: |
          connectionString=$(cat ${{env.APPSETTINGS_FILEPATH}} | jq '.ConnectionStrings.DresscaDbContext')
          echo "CONNECTION_STRING=${connectionString}" >> "$GITHUB_OUTPUT"

      - name: EF Core ツールのインストール
        shell: bash
        run: dotnet tool install --global dotnet-ef --version 10.*

      - name: データベースのマイグレーション適用
        working-directory: samples/Dressca/dressca-backend/src/Dressca.EfInfrastructure
        shell: bash
        run: dotnet ef database update --connection ${{ steps.get-connection-string.outputs.CONNECTION_STRING }}
      
      # ヘルスチェック
      - name: フロントエンドの起動確認
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent "http://${FRONTEND_HOST}:${FRONTEND_PORT}" > /dev/null; then
              exit 0
            fi
            sleep 2
          done

          cat /var/tmp/consumer-preview.log
          exit 1
      
      - name: バックエンドの起動確認
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent "http://${BACKEND_HOST}:${BACKEND_PORT}" > /dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done

          cat /var/tmp/consumer-api.log
          exit 1

      # ベースラインスキャンの実行
      # - name: Run ZAP Baseline Scan
      #   uses: zaproxy/action-baseline@v0.15.0
      #   with:
      #     token: ${{ secrets.GITHUB_TOKEN }}
      #     target: http://${{ env.FRONTEND_HOST }}:${{ env.FRONTEND_PORT }}
      #     rules_file_name: .zap/rules.tsv
      #     cmd_options: '-a -j'
      #     allow_issue_writing: false

      # ZAP daemon 起動
      - name: Start ZAP Daemon
        shell: bash
        run: |
          docker run -d --name zap \
            --network host \
            -u root \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -daemon -host 0.0.0.0 -port 8080 \
              -addonuninstall client \
              -config api.disablekey=true \
              -config api.addrs.addr.name=.* \
              -config api.addrs.addr.regex=true

      - name: Wait for ZAP to be ready
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8080/JSON/core/view/version/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done

          docker logs zap
          exit 1

      # Playwright テストシナリオを ZAP プロキシ経由で実行
      - name: Playwright 依存のインストール
        working-directory: samples/Dressca/dressca-frontend/consumer
        run: npm i -D @playwright/test

      - name: Playwright ブラウザーのインストール
        working-directory: samples/Dressca/dressca-frontend/consumer
        run: npx playwright install --with-deps chromium
      
      - name: Playwright でのユースケースの実行
        working-directory: samples/Dressca/dressca-frontend/consumer
        env:
          BASE_URL: http://${{ env.FRONTEND_HOST }}:${{ env.FRONTEND_PORT }}
          ZAP_PROXY: http://127.0.0.1:8080
          DEBUG_DIR: ${{ runner.temp }}/zap-playwright-debug
        run: |
          node <<'EOF'
          const fs = require('node:fs/promises')
          const path = require('node:path')
          const { chromium } = require('playwright')

          const debugDir = process.env.DEBUG_DIR
          const consoleLogs = []
          const failedRequests = []
          const errorResponses = []

          ;(async () => {
            await fs.mkdir(debugDir, { recursive: true })

            const browser = await chromium.launch({ headless: true })
            const context = await browser.newContext({
              proxy: {
                server: process.env.ZAP_PROXY,
              },
            })

            const page = await context.newPage()

            page.on('console', (msg) => {
              consoleLogs.push({ type: msg.type(), text: msg.text() })
            })

            page.on('requestfailed', (request) => {
              failedRequests.push({
                url: request.url(),
                method: request.method(),
                errorText: request.failure()?.errorText,
              })
            })

            page.on('response', (response) => {
              if (response.status() >= 400) {
                errorResponses.push({
                  url: response.url(),
                  status: response.status(),
                  statusText: response.statusText(),
                })
              }
            })

            try {
              await page.goto(`${process.env.BASE_URL}/authentication/login`, { waitUntil: 'domcontentloaded' })
              await page.screenshot({ path: path.join(debugDir, '01-login-page.png'), fullPage: true })
              await fs.writeFile(path.join(debugDir, '01-login-page.html'), await page.content(), 'utf8')

              await page.fill('#email', 'user@example.com')
              await page.fill('#password', 'password')

              const loginButton = page.getByRole('button', { name: 'ログイン' })
              const disabled = await loginButton.isDisabled()
              await fs.writeFile(
                path.join(debugDir, '02-login-button-state.txt'),
                `url=${page.url()}\nloginButtonDisabled=${disabled}\n`,
                'utf8',
              )

              await loginButton.click()
              await page.waitForLoadState('networkidle')

              await fs.writeFile(path.join(debugDir, '03-after-login-url.txt'), `${page.url()}\n`, 'utf8')
              await page.screenshot({ path: path.join(debugDir, '03-after-login.png'), fullPage: true })
              await fs.writeFile(path.join(debugDir, '03-after-login.html'), await page.content(), 'utf8')

              await page.getByRole('button', { name: '買い物かごに入れる' }).first().waitFor({ timeout: 15000 })
              await page.getByRole('button', { name: '買い物かごに入れる' }).first().click()
              await page.getByRole('button', { name: 'レジに進む' }).click()
              await page.getByRole('button', { name: '注文を確定する' }).click()

              await page.screenshot({ path: path.join(debugDir, '04-after-order.png'), fullPage: true })
            } catch (error) {
              await fs.writeFile(path.join(debugDir, '99-playwright-error.txt'), String(error?.stack || error), 'utf8')
              await page.screenshot({ path: path.join(debugDir, '99-failed-page.png'), fullPage: true })
              await fs.writeFile(path.join(debugDir, '99-failed-page.html'), await page.content(), 'utf8')
              throw error
            } finally {
              await fs.writeFile(path.join(debugDir, '10-console-logs.json'), JSON.stringify(consoleLogs, null, 2), 'utf8')
              await fs.writeFile(path.join(debugDir, '11-request-failed.json'), JSON.stringify(failedRequests, null, 2), 'utf8')
              await fs.writeFile(path.join(debugDir, '12-response-errors.json'), JSON.stringify(errorResponses, null, 2), 'utf8')
              await browser.close()
            }
          })().catch((e) => {
            console.error(e)
            process.exit(1)
          })
          EOF

      - name: 失敗時ログの収集
        if: failure()
        shell: bash
        run: |
          echo "--- frontend log ---"
          cat /var/tmp/consumer-preview.log || true
          echo "--- backend log ---"
          cat /var/tmp/consumer-api.log || true
          echo "--- zap log ---"
          docker logs zap || true

      - name: Playwright 診断情報のアップロード
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-playwright-debug
          path: ${{ runner.temp }}/zap-playwright-debug

      - name: アプリケーションログのアップロード
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-application-logs
          path: | 
            /var/tmp/consumer-preview.log
            /var/tmp/consumer-api.log
          if-no-files-found: warn

      # スキャン範囲をユースケース関連画面に限定--
      - name: Configure ZAP context
        shell: bash
        run: |
          curl --silent "http://127.0.0.1:8080/JSON/context/action/newContext/?contextName=Dressca"
          curl --silent "http://127.0.0.1:8080/JSON/context/action/includeInContext/?contextName=Dressca&regex=http://127.0.0.1:4173/authentication/login.*"
          curl --silent "http://127.0.0.1:8080/JSON/context/action/includeInContext/?contextName=Dressca&regex=http://127.0.0.1:4173/basket.*"
          curl --silent "http://127.0.0.1:8080/JSON/context/action/includeInContext/?contextName=Dressca&regex=http://127.0.0.1:4173/ordering/checkout.*"

      # Spider
      - name: Run ZAP spider
        shell: bash
        run: |
          scan_id=$(curl --silent "http://127.0.0.1:8080/JSON/spider/action/scan/?url=http://127.0.0.1:4173/&maxChildren=20&recurse=true" | jq -r .scan)
          for attempt in {1..120}; do
            status=$(curl --silent "http://127.0.0.1:8080/JSON/spider/view/status/?scanId=${scan_id}" | jq -r .status)
            echo "Spider status: ${status}%"
            [ "${status}" = "100" ] && exit 0
            sleep 2
          done
          exit 1

      # Active Scan
      - name: Run ZAP active scan
        shell: bash
        run: |
          scan_id=$(curl --silent "http://127.0.0.1:8080/JSON/ascan/action/scan/?url=http://127.0.0.1:4173/&recurse=true&inScopeOnly=true" | jq -r .scan)
          for attempt in {1..180}; do
            status=$(curl --silent "http://127.0.0.1:8080/JSON/ascan/view/status/?scanId=${scan_id}" | jq -r .status)
            echo "Active scan status: ${status}%"
            [ "${status}" = "100" ] && exit 0
            sleep 5
          done
          exit 1

      - name: Export ZAP report
        shell: bash
        run: |
          curl --silent "http://127.0.0.1:8080/OTHER/core/other/htmlreport/" -o zap-report.html
          curl --silent "http://127.0.0.1:8080/JSON/core/view/alerts/?baseurl=http://127.0.0.1:4173" | jq . > zap-alerts.json

      - name: Upload ZAP artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zap-results
          path: |
            zap-report.html
            zap-alerts.json

      - name: Stop ZAP
        if: always()
        shell: bash
        run: docker rm -f zap || true
      