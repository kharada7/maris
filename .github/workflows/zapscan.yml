name: ZAP Scan for CSR Application

on:
  workflow_dispatch:

env:
  FRONTEND_HOST: 127.0.0.1
  FRONTEND_PORT: 4173
  BACKEND_HOST: 127.0.0.1
  BACKEND_PORT: 5000

jobs:
  zap-scan:
    name: Run OWASP ZAP Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      
      # Frontend セットアップとデプロイ
      - name: Use Node.js LTS
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: lts/*
          cache: npm
      
      - name: Node パッケージのインストール
        working-directory: samples/Dressca/dressca-frontend
        run: npm ci
      
      - name: フロントエンドのビルド
        working-directory: samples/Dressca/dressca-frontend
        run: npm run build:prod:consumer
      
      - name: フロントエンドサーバーへのデプロイ
        working-directory: samples/Dressca/dressca-frontend
        shell: bash
        run: |
          nohup npm run preview -w consumer -- --host "${FRONTEND_HOST}" --port "${FRONTEND_PORT}" > /var/tmp/consumer-preview.log 2>&1 &
      
      # Backend セットアップとデプロイ
      - name: .NET SDK のセットアップ
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          dotnet-version: '10.*'
      
      - name: NuGet パッケージの復元
        working-directory: samples/Dressca/dressca-backend
        run: dotnet restore Dressca.Web.Consumer.slnf
      
      - name: バックエンドのビルド
        working-directory: samples/Dressca/dressca-backend
        env:
          BUILD_CONFIGURATION: Release
        run: dotnet build Dressca.Web.Consumer.slnf --no-restore --configuration Release --verbosity minimal
      
      - name: バックエンドサーバーへのデプロイ
        working-directory: samples/Dressca/dressca-backend
        shell: bash
        run: |
          nohup dotnet run --project src/Dressca.Web.Consumer/Dressca.Web.Consumer.csproj --configuration Release --no-build -- --urls "http://${BACKEND_HOST}:${BACKEND_PORT}" > /var/tmp/consumer-api.log 2>&1 &
      
      # ヘルスチェック
      - name: フロントエンドの起動確認
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent "http://${FRONTEND_HOST}:${FRONTEND_PORT}" > /dev/null; then
              exit 0
            fi
            sleep 2
          done

          cat /var/tmp/consumer-preview.log
          exit 1
      
      - name: バックエンドの起動確認
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent "http://${BACKEND_HOST}:${BACKEND_PORT}" > /dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done

          cat /var/tmp/consumer-api.log
          exit 1

      # ベースラインスキャンの実行
      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: http://${{ env.FRONTEND_HOST }}:${{ env.FRONTEND_PORT }}
          rules_file_name: .zap/rules.tsv
          cmd_options: '-a -j'
          allow_issue_writing: false

      # ZAP daemon 起動
      - name: Start ZAP Daemon
        shell: bash
        run: |
          docker run -d --name zap \
            -u root \
            -p 8080:8080 \
            -p 8090:8090 \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -daemon -host 0.0.0.0 -port 8090 \
              -config api.disablekey=true \
              -config api.addrs.addr.name=.* \
              -config api.addrs.addr.regex=true

      - name: Wait for ZAP to be ready
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8090/JSON/core/view/version/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done

          docker logs zap
          exit 1

      # Playwright テストシナリオを ZAP プロキシ経由で実行
      - name: Playwright 依存のインストール
        working-directory: samples/Dressca/dressca-frontend/consumer
        run: npm i -D @playwright/test

      - name: Playwright ブラウザーのインストール
        working-directory: samples/Dressca/dressca-frontend/consumer
        run: npx playwright install --with-deps chromium
      
      - name: Playwright でのユースケースの実行
        working-directory: samples/Dressca/dressca-frontend/consumer
        env:
          BASE_URL: http://${{ env.FRONTEND_HOST }}:${{ env.FRONTEND_PORT }}
          ZAP_PROXY: http://127.0.0.1:8080
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              proxy: {
                server: process.env.ZAP_PROXY
              }
            });
            const page = await context.newPage();
            await page.goto(process.env.BASE_URL + '/authentication/login');
            await page.fill('#email', 'user@example.com');
            await page.fill('#password', 'password');
            await page.getByRole('button', { name: 'ログイン' }).click();
            await page.getByRole('button', { name: '買い物かごに入れる' }).first().click();
            await page.getByRole('button', { name: 'レジに進む' }).click();
            await page.getByRole('button', { name: '注文を確定する' }).click();
            await browser.close();
          })().catch(e => {
            console.error(e);
            process.exit(1);
          });
          "

      # スキャン範囲をユースケース関連画面に限定
      - name: Configure ZAP context
        shell: bash
        run: |
          curl --silent "http://127.0.0.1:8090/JSON/context/action/newContext/?contextName=Dressca"
          curl --silent "http://127.0.0.1:8090/JSON/context/action/includeInContext/?contextName=Dressca&regex=http://127.0.0.1:4173/authentication/login.*"
          curl --silent "http://127.0.0.1:8090/JSON/context/action/includeInContext/?contextName=Dressca&regex=http://127.0.0.1:4173/basket.*"
          curl --silent "http://127.0.0.1:8090/JSON/context/action/includeInContext/?contextName=Dressca&regex=http://127.0.0.1:4173/ordering/checkout.*"

      # Spider
      - name: Run ZAP spider
        shell: bash
        run: |
          scan_id=$(curl --silent "http://127.0.0.1:8090/JSON/spider/action/scan/?url=http://127.0.0.1:4173/&maxChildren=20&recurse=true" | jq -r .scan)
          for attempt in {1..120}; do
            status=$(curl --silent "http://127.0.0.1:8090/JSON/spider/view/status/?scanId=${scan_id}" | jq -r .status)
            echo "Spider status: ${status}%"
            [ "${status}" = "100" ] && exit 0
            sleep 2
          done
          exit 1

      # Active Scan
      - name: Run ZAP active scan
        shell: bash
        run: |
          scan_id=$(curl --silent "http://127.0.0.1:8090/JSON/ascan/action/scan/?url=http://127.0.0.1:4173/&recurse=true&inScopeOnly=true" | jq -r .scan)
          for attempt in {1..180}; do
            status=$(curl --silent "http://127.0.0.1:8090/JSON/ascan/view/status/?scanId=${scan_id}" | jq -r .status)
            echo "Active scan status: ${status}%"
            [ "${status}" = "100" ] && exit 0
            sleep 5
          done
          exit 1

      - name: Export ZAP report
        shell: bash
        run: |
          curl --silent "http://127.0.0.1:8090/OTHER/core/other/htmlreport/" -o zap-report.html
          curl --silent "http://127.0.0.1:8090/JSON/core/view/alerts/?baseurl=http://127.0.0.1:4173" | jq . > zap-alerts.json

      - name: Upload ZAP artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zap-results
          path: |
            zap-report.html
            zap-alerts.json

      - name: Stop ZAP
        if: always()
        shell: bash
        run: docker rm -f zap || true
      